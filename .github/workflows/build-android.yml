name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Build APK
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive --local --output ../aijusik.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aijusik-apk
          path: aijusik.apk
          retention-days: 7
