name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Expo Prebuild
        working-directory: mobile
        run: npx expo prebuild --platform android --clean

      - name: Fix Gradle plugin resolution
        working-directory: mobile/android
        run: |
          echo "=== settings.gradle (before patch) ==="
          cat settings.gradle
          python3 - <<'EOF'
import re

with open("settings.gradle", "r") as f:
    content = f.read()

if "expo-modules-core" not in content:
    content = content.replace(
        "pluginManagement {",
        'pluginManagement {\n    includeBuild "../node_modules/expo-modules-core/android"'
    )
    with open("settings.gradle", "w") as f:
        f.write(content)
    print("Patched: expo-modules-core/android added")
else:
    print("Already contains expo-modules-core, skipping patch")
EOF
          echo "=== settings.gradle (after patch) ==="
          cat settings.gradle

      - name: Build APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aijusik-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
